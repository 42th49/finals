<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법과 정치 플래시카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1c2433;
    --navy-deep:#11161f;
    --paper:#f7f2e7;
    --paper-edge:#ece4d3;
    --ink:#2a2a28;
    --brass:#c2a06b;
    --brass-light:#e6cf9f;
    --line:rgba(28,36,51,0.12);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 15%, rgba(194,160,107,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(194,160,107,0.08), transparent 45%),
      var(--navy);
    font-family:'Noto Sans KR', sans-serif;
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .stage{
    width:100%;
    max-width:680px;
  }

  /* ---------- 공통 헤더 ---------- */
  .masthead{
    text-align:center;
    margin-bottom:28px;
  }
  .masthead .eyebrow{
    font-size:12px;
    letter-spacing:0.35em;
    color:var(--brass);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .masthead h1{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:clamp(26px, 5vw, 36px);
    letter-spacing:0.04em;
  }
  .masthead .sub{
    margin-top:8px;
    font-size:13px;
    color:rgba(247,242,231,0.55);
    letter-spacing:0.05em;
  }
  .rule{
    height:1px;
    margin:18px auto 0;
    width:120px;
    background:linear-gradient(90deg, transparent, var(--brass), transparent);
  }

  /* ================= 선택 화면 ================= */
  .select-panel{
    background:var(--paper);
    color:var(--ink);
    border-radius:6px;
    padding:28px 26px 22px;
    box-shadow:0 30px 60px -25px rgba(0,0,0,0.55);
    position:relative;
  }
  .select-panel::before{
    content:'';
    position:absolute;
    inset:10px;
    border:1px solid var(--line);
    border-radius:3px;
    pointer-events:none;
  }
  .select-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:14px;
    font-family:'Noto Serif KR', serif;
  }
  .select-head h2{ font-size:18px; font-weight:700; }
  .select-actions{
    display:flex;
    gap:10px;
    font-size:12px;
  }
  .select-actions button{
    background:none;
    border:none;
    color:#7a6a4a;
    text-decoration:underline;
    cursor:pointer;
    font-family:'Noto Sans KR', sans-serif;
    padding:0;
  }
  .select-actions button:hover{ color:var(--ink); }

  .card-list{
    list-style:none;
    border-top:1px solid var(--line);
    max-height:46vh;
    overflow-y:auto;
  }
  .card-list li{
    border-bottom:1px solid var(--line);
  }
  .card-list label{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:11px 4px;
    cursor:pointer;
    font-size:14.5px;
    line-height:1.5;
  }
  .card-list .num{
    flex:0 0 28px;
    font-family:'Noto Serif KR', serif;
    font-weight:600;
    color:var(--brass);
    font-size:13px;
    padding-top:1px;
  }
  .card-list input[type="checkbox"]{
    appearance:none;
    width:17px; height:17px;
    border:1.5px solid #b8a98a;
    border-radius:3px;
    margin-top:1px;
    flex:0 0 17px;
    position:relative;
    cursor:pointer;
  }
  .card-list input[type="checkbox"]:checked{
    background:var(--ink);
    border-color:var(--ink);
  }
  .card-list input[type="checkbox"]:checked::after{
    content:'';
    position:absolute;
    left:5px; top:1px;
    width:5px; height:9px;
    border:solid var(--paper);
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .card-list .title{ flex:1; }

  .select-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .count-badge{
    font-size:12px;
    color:#7a6a4a;
    letter-spacing:0.04em;
  }
  .count-badge b{ color:var(--ink); font-size:14px; }

  .start-btn{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.08em;
    background:var(--navy);
    color:var(--brass-light);
    border:none;
    padding:12px 26px;
    border-radius:3px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .start-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px -8px rgba(0,0,0,0.6); }
  .start-btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ================= 플래시카드 화면 ================= */
  .quiz-panel{ display:none; }
  .quiz-panel.active{ display:block; }
  .select-panel.hidden{ display:none; }

  .progress-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    font-size:12px;
    letter-spacing:0.08em;
    color:rgba(247,242,231,0.6);
  }
  .progress-row .seal{
    font-family:'Noto Serif KR', serif;
    color:var(--brass-light);
    border:1px solid var(--brass);
    border-radius:50%;
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700;
    font-size:13px;
  }
  .progress-bar{
    flex:1;
    height:2px;
    margin:0 16px;
    background:rgba(247,242,231,0.15);
    position:relative;
  }
  .progress-bar i{
    position:absolute; left:0; top:0; bottom:0;
    background:var(--brass);
    transition:width .25s ease;
  }

  .card-wrap{
    perspective:1600px;
  }
  .card{
    position:relative;
    width:100%;
    min-height:320px;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }

  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:6px;
    background:var(--paper);
    color:var(--ink);
    box-shadow:0 30px 60px -25px rgba(0,0,0,0.55);
    display:flex;
    flex-direction:column;
    padding:34px 32px;
  }
  .face::before{
    content:'';
    position:absolute;
    inset:10px;
    border:1px solid var(--line);
    border-radius:3px;
    pointer-events:none;
  }
  .face.back{ transform:rotateY(180deg); }

  .face .tag{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--brass);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .face.front{ align-items:center; justify-content:center; text-align:center; }
  .face.front h3{
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:clamp(20px, 4vw, 28px);
    line-height:1.5;
  }
  .face.front .tap-hint{
    position:absolute;
    bottom:24px; left:0; right:0;
    text-align:center;
    font-size:12px;
    color:#a08f6c;
    letter-spacing:0.1em;
  }

  .face.back .content{
    font-size:14.5px;
    line-height:1.85;
    overflow-y:auto;
    flex:1;
    white-space:pre-line;
  }
  .face.back .content strong{
    font-weight:700;
    color:#5a3e1f;
  }
  .face.back .content .qa{
    color:#7a6a4a;
    font-style:italic;
  }

  .nav-row{
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .nav-row button{
    font-family:'Noto Sans KR', sans-serif;
    font-size:13px;
    letter-spacing:0.05em;
    border:1px solid rgba(247,242,231,0.25);
    background:transparent;
    color:var(--paper);
    padding:11px 0;
    border-radius:3px;
    cursor:pointer;
    flex:1;
    transition:background .15s ease, border-color .15s ease;
  }
  .nav-row button:hover{
    background:rgba(247,242,231,0.08);
    border-color:var(--brass);
  }
  .nav-row button.shuffle{ flex:0 0 auto; padding:11px 18px; }
  .nav-row .restart{
    flex:0 0 auto;
    padding:11px 18px;
    color:var(--brass-light);
    border-color:var(--brass);
  }

  .done-msg{
    text-align:center;
    padding:60px 20px;
  }
  .done-msg p{
    font-family:'Noto Serif KR', serif;
    font-size:20px;
    margin-bottom:18px;
  }

  @media (max-width:480px){
    .face{ padding:24px 20px; }
    .card{ min-height:380px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="masthead">
    <div class="eyebrow">법과 정치 · 헌법 단원</div>
    <h1>플래시카드</h1>
    <div class="sub">학습할 항목을 선택하고 무작위 순서로 복습하세요</div>
    <div class="rule"></div>
  </div>

  <!-- 선택 화면 -->
  <div class="select-panel" id="selectPanel">
    <div class="select-head">
      <h2>항목 선택</h2>
      <div class="select-actions">
        <button onclick="toggleAll(true)">전체 선택</button>
        <button onclick="toggleAll(false)">전체 해제</button>
      </div>
    </div>
    <ul class="card-list" id="cardList"></ul>
    <div class="select-footer">
      <div class="count-badge"><b id="selCount">0</b> / <span id="totalCount">0</span> 항목 선택됨</div>
      <button class="start-btn" id="startBtn" onclick="startQuiz()">학습 시작</button>
    </div>
  </div>

  <!-- 플래시카드 화면 -->
  <div class="quiz-panel" id="quizPanel">
    <div class="progress-row">
      <div class="seal" id="sealNum">1</div>
      <div class="progress-bar"><i id="progressFill" style="width:0%"></i></div>
      <div id="progressText">1 / 0</div>
    </div>

    <div class="card-wrap">
      <div class="card" id="card" onclick="flipCard()">
        <div class="face front">
          <span class="tag">조항</span>
          <h3 id="frontText"></h3>
          <div class="tap-hint">탭하여 내용 보기</div>
        </div>
        <div class="face back">
          <span class="tag">내용</span>
          <div class="content" id="backText"></div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="shuffle" onclick="reshuffle()">🔀 다시 섞기</button>
      <button onclick="prevCard()">이전</button>
      <button onclick="nextCard()">다음</button>
      <button class="restart" onclick="goSelect()">항목 선택</button>
    </div>
  </div>
</div>

<script>
const data = [
  {
    title: "청구권의 성격 및 관련 헌법 조항",
    body: `청구권: 기본권이 침해되었을 때 국가에 구제를 <strong>요구</strong>할 권리 (<strong>능동적, 적극적</strong> 권리)
다른 기본권을 보장하기 위한 <strong>수단적(절차적)</strong> 권리

관련 헌법 조항: 재판 청구권, 국가 배상 청구권

재판 청구권: 모든 국민은 헌법과 법률이 정한 법관에 의하여 법률에 의한 재판을 받을 권리를 가진다.

국가 배상 청구권: 공무원의 직무상 불법 행위로 손해를 받은 국민은 법률이 정하는 바에 의하여 국가 또는 공공 단체에 정당한 배상을 요구할 수 있다. 이 경우 공무원 자신의 책임은 면제되지 아니한다.`
  },
  {
    title: "법의 제정 주체",
    body: `헌법: 국민 (국민 투표로 개정 가능), 1987년 개정

법률: 국회 (국회 본회의 과반수 이상 찬성 시, 거부권 행사 후 2/3 이상 찬성 시 제정 및 개정 가능)

명령: 대통령, 국무총리, 각 부 장관 단독 결정

조례: 지방의회
규칙: 지방자치단체의 장`
  },
  {
    title: "법 적용의 원칙",
    body: `1. 상위법 우선의 원칙
2. 특별법 우선의 원칙
3. 신법 우선의 원칙
4. 법률 불소급의 원칙

<span class="qa">Q. 신법 vs 과거 특별법?
A. 특별법 > 신법

Q. 소급이란?
A. 거슬러 올라감, 즉 법 제정 이전의 행동에 대한 처벌 불가</span>`
  },
  {
    title: "헌법의 성격",
    body: `가장 상위의 <strong>최고법</strong>으로 <strong>최고 규범성</strong>을 가짐

국가의 통치 원리를 규정하고 기본권을 보장하는 기본법이자 근본법`
  },
  {
    title: "입헌주의의 원칙",
    body: `등장 배경: 전제 군주의 절대 권력에 대항하여 개인의 자유를 보장 (시민혁명)

기본 원리: 국민 주권의 원리, 기본권 보장, 대의제(의회주의), 권력 분립, 법치주의

권력 분립, 법치주의 등을 통해 국가의 권력 행사를 합리적으로 제한, 국민의 기본권을 보장하는 데 주력

vs. 복지 국가: 복지 국가는 생존권(사회권) 추가

“입헌주의는 헌법에 의한 통치를 말한다. 국가의 권력을 제한함으로써 국민의 권리와 자유를 보장한다.”`
  },
  {
    title: "헌법 전문에 나타난 헌법의 기본 원리",
    body: `1. 국민 주권주의
국가 중대사를 결정하는 주권과 모든 국가 권력의 근거 → 국민
실현 수단: 참정권 보장, 국민투표제, 복수 정당제 등

2. 자유 민주주의
자유로운 개인의 의사결정을 존중하며 국가 권력은 그러한 자유로운 개인의 의사의 합치에 의해 정당성 확보 가능
실현 수단: 법치주의, 적법 절차의 원리, 사법권의 독립 등

3. 복지 국가의 원리
국가는 모든 국민이 인간으로서의 존엄을 지키기 위해 기본적 생활 수요를 충족할 권리와 건강하고 인간다운 생활을 영위할 권리 보장
실현 수단: 사회권의 보장, 최저임금제, 미성년자의 근로 보호, 국민연금제, 건강보험제, 고용보험, 산업재해보상 보험, 기초연금, 기초생활보장제 등`
  },
  {
    title: "국민 투표",

  },
  {
    title: "국민 주권주의",
    body: `의미: 국가의 최고 의사를 결정하는 주권이 국민에게 있고 모든 국가 권력의 근거가 국민에게 있다는 원리

관련 규정: 대한민국은 민주 공화국이다. 대한민국의 주권은 국민에게 있고 모든 권력은 국민으로부터 나온다.

실현 방안: 참정권 보장, 국민 투표제, 언론·출판·집회·결사의 자유 보장, 복수 정당제 등`
  },
  {
    title: "자유 민주주의의 의미",
    body: `자유로운 개인의 의사결정을 존중하며 국가 권력은 그러한 자유로운 개인의 의사의 합치에 의해 정당성 확보 가능

“자유로운 개인의 의사의 합치로 국가 권력의 정당성을 확보해서, 그 정당한 권력으로 시민을 통치하는 시스템” → 이러한 시스템이 개인의 자유를 확대`
  },
  {
    title: "복지국가의 실현을 위한 제도와 실현 방식",
    body: `사회권 보장, 최저임금제, 미성년자의 근로 보호, 국민연금제, 건강보험제, 고용보험, 산업재해보상 보험, 기초연금, 기초생활보장제 등 각종 사회 보장 제도`

  {
    title: "수형자의 선거권 제한의 정당성 판단 기준",
    body: `기본권 제한의 한계: 자유와 권리의 본질적인 내용 침해 금지 → 개별 기본권이 그 기능을 상실하게 될 정도로 본질적인 내용을 침해할 수 없음

수형자의 선거권을 제한한다면 수형자의 참정권이 기능을 상실할 정도로 침해하는 것이므로, 제한하는 것은 정당하지 않다`
  },
  {
    title: "헌법의 개정",
    body: `발의(국회 1/2 찬성/대통령 and 국무회의 심의) → 공고 → 국회 의결 (2/3) → 국민 투표(1/2 투표, 그 중 1/2 찬성) → 대통령 공포`
  },

let selectedIndexes = [];
let order = [];
let current = 0;

// build select list
const cardList = document.getElementById('cardList');
data.forEach((item, i) => {
  const li = document.createElement('li');
  li.innerHTML = `
    <label>
      <input type="checkbox" class="chk" data-i="${i}" checked>
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="title">${item.title}</span>
    </label>`;
  cardList.appendChild(li);
});
document.getElementById('totalCount').textContent = data.length;

cardList.addEventListener('change', updateCount);
function updateCount(){
  const checked = document.querySelectorAll('.chk:checked').length;
  document.getElementById('selCount').textContent = checked;
  document.getElementById('startBtn').disabled = checked === 0;
}
updateCount();

function toggleAll(state){
  document.querySelectorAll('.chk').forEach(c => c.checked = state);
  updateCount();
}

function shuffleArr(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(){
  selectedIndexes = [...document.querySelectorAll('.chk:checked')].map(c => parseInt(c.dataset.i));
  order = shuffleArr(selectedIndexes);
  current = 0;
  document.getElementById('selectPanel').classList.add('hidden');
  document.getElementById('quizPanel').classList.add('active');
  renderCard();
}

function goSelect(){
  document.getElementById('quizPanel').classList.remove('active');
  document.getElementById('selectPanel').classList.remove('hidden');
}

function renderCard(){
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const idx = order[current];
  document.getElementById('frontText').textContent = data[idx].title;
  document.getElementById('backText').innerHTML = data[idx].body.replace(/\n/g, '<br>');
  document.getElementById('sealNum').textContent = current + 1;
  document.getElementById('progressText').textContent = `${current+1} / ${order.length}`;
  document.getElementById('progressFill').style.width = `${((current+1)/order.length)*100}%`;
}

function flipCard(){
  document.getElementById('card').classList.toggle('flipped');
}

function nextCard(){
  current = (current + 1) % order.length;
  renderCard();
}

function prevCard(){
  current = (current - 1 + order.length) % order.length;
  renderCard();
}

function reshuffle(){
  order = shuffleArr(selectedIndexes);
  current = 0;
  renderCard();
}
</script>
